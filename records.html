<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة العملاء</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #FFF8DC;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية دوار الشمس */
        body::before {
            content: '🌻';
            position: fixed;
            font-size: 10rem;
            top: -5%;
            left: -3%;
            opacity: 0.06;
            transform: rotate(-15deg);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '🌻';
            position: fixed;
            font-size: 8rem;
            bottom: -5%;
            right: -3%;
            opacity: 0.05;
            transform: rotate(20deg);
            pointer-events: none;
            z-index: 0;
        }

        .sunflower {
            position: fixed;
            font-size: 2.5rem;
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }
        .sunflower:nth-child(1) { top: 10%; right: 5%; }
        .sunflower:nth-child(2) { top: 20%; left: 8%; }
        .sunflower:nth-child(3) { bottom: 15%; right: 8%; }
        .sunflower:nth-child(4) { bottom: 20%; left: 5%; }
        .sunflower:nth-child(5) { top: 50%; right: 3%; }
        .sunflower:nth-child(6) { top: 45%; left: 3%; }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 252, 245, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(80, 60, 30, 0.15);
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 218, 185, 0.3);
        }

        /* ===== العنوان ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            gap: 15px;
        }
        .header h1 {
            font-size: 2rem;
            color: #5C4033;
        }
        .header h1 i {
            color: #D4A373;
        }
        .header .subtitle {
            color: #8B6B5E;
            font-size: 0.95rem;
        }

        .btn-back {
            padding: 12px 24px;
            background: #D4A373;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-back:hover {
            background: #B8860B;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(184, 134, 11, 0.3);
        }

        /* ===== الإحصائيات ===== */
        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .stats .stat-box {
            background: rgba(255, 248, 235, 0.6);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 218, 185, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stats .stat-box i {
            color: #D4A373;
            font-size: 1.2rem;
        }
        .stats .stat-box strong {
            color: #5C4033;
        }

        /* ===== الجدول ===== */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid rgba(255, 218, 185, 0.3);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            min-width: 700px;
        }
        th {
            background: rgba(255, 235, 215, 0.7);
            color: #5C4033;
            font-weight: 600;
            padding: 15px 12px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 218, 185, 0.4);
        }
        td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255, 228, 210, 0.3);
            vertical-align: middle;
            color: #3d2b1f;
            text-align: center;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: rgba(255, 248, 235, 0.4);
        }

        .customer-id {
            font-weight: 600;
            color: #B8860B;
            font-size: 0.9rem;
        }
        .full-name .first {
            color: #5C4033;
            font-weight: 500;
        }
        .full-name .last {
            color: #8B6B5E;
        }

        /* ===== حالة العميل ===== */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 248, 235, 0.8);
            padding: 4px 12px 4px 8px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-badge .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.active {
            background: #7CB342;
        }
        .dot.inactive {
            background: #C4A88A;
        }

        /* ===== زر التبديل ===== */
        .toggle-btn {
            background: transparent;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 0 6px;
            transition: 0.2s;
            color: #B8860B;
        }
        .toggle-btn:hover {
            color: #8B6914;
            transform: scale(1.2);
        }

        .empty-msg {
            padding: 40px;
            text-align: center;
            color: #A0806A;
            font-size: 1.1rem;
        }

        .btn-retry {
            width: 100%;
            padding: 12px;
            background: #D4A373;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-retry:hover {
            background: #B8860B;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 218, 185, 0.3);
            color: #A0806A;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .sunflower {
                display: none;
            }
            .stats {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="sunflower">🌻</div>
    <div class="sunflower">🌻</div>
    <div class="sunflower">🌻</div>
    <div class="sunflower">🌻</div>
    <div class="sunflower">🌻</div>
    <div class="sunflower">🌻</div>

    <div class="container">
        <!-- ===== العنوان ===== -->
        <div class="header">
            <div>
                <h1><i class="fas fa-users"></i> قائمة العملاء</h1>
                <div class="subtitle">جميع بيانات العملاء المسجلين</div>
            </div>
            <a href="index.html" class="btn-back">
                <i class="fas fa-arrow-right"></i> العودة للنموذج
            </a>
        </div>

        <!-- ===== الإحصائيات ===== -->
        <div class="stats" id="statsContainer">
            <div class="stat-box">
                <i class="fas fa-users"></i>
                <span>إجمالي العملاء: <strong id="totalCustomers">0</strong></span>
            </div>
            <div class="stat-box">
                <i class="fas fa-check-circle" style="color: #7CB342;"></i>
                <span>نشط: <strong id="activeCustomers">0</strong></span>
            </div>
            <div class="stat-box">
                <i class="fas fa-times-circle" style="color: #C4A88A;"></i>
                <span>غير نشط: <strong id="inactiveCustomers">0</strong></span>
            </div>
        </div>

        <!-- ===== الجدول ===== -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>معرف العميل</th>
                        <th>الاسم الأول</th>
                        <th>اسم العائلة</th>
                        <th>الاسم الكامل</th>
                        <th>العمر</th>
                        <th>الحالة</th>
                        <th>تبديل</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="8" class="empty-msg">⏳ جاري تحميل البيانات...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <button class="btn-retry" id="retryBtn" onclick="retryConnection()">
            <i class="fas fa-sync"></i> إعادة المحاولة
        </button>

        <div class="footer">
            <i class="fas fa-database"></i> نظام إدارة بيانات العملاء
        </div>
    </div>

    <script>
        // ===== إعدادات API =====
        const API = {
            fetchAll: 'config.php?action=fetch',
            toggle: 'config.php?action=toggle'
        };

        // ===== عناصر DOM =====
        const tbody = document.getElementById('tableBody');
        const totalSpan = document.getElementById('totalCustomers');
        const activeSpan = document.getElementById('activeCustomers');
        const inactiveSpan = document.getElementById('inactiveCustomers');
        const retryBtn = document.getElementById('retryBtn');

        // ===== تنسيق النصوص =====
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        // ===== تحديث الإحصائيات =====
        function updateStats(total, active, inactive) {
            totalSpan.textContent = total;
            activeSpan.textContent = active;
            inactiveSpan.textContent = inactive;
        }

        // ===== عرض البيانات =====
        function renderRecords(records) {
            if (!records || records.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="empty-msg">📭 لا يوجد عملاء. أضف عميلاً!</td></tr>`;
                updateStats(0, 0, 0);
                return;
            }

            let html = '';
            let total = records.length;
            let active = 0;
            let inactive = 0;

            records.forEach(record => {
                const id = record.customer_id;
                const customerId = record.customer_id || '—';
                const firstname = record.firstname || '—';
                const lastname = record.lastname || '—';
                const fullName = `${firstname} ${lastname}`;
                const age = record.age || '—';
                const status = parseInt(record.status, 10) === 1 ? 1 : 0;
                const statusText = status === 1 ? 'نشط' : 'غير نشط';
                const dotClass = status === 1 ? 'active' : 'inactive';
                const toggleIcon = status === 1 ? 'fa-toggle-on' : 'fa-toggle-off';

                if (status === 1) active++;
                else inactive++;

                html += `
                    <tr data-id="${id}">
                        <td><strong>${id}</strong></td>
                        <td class="customer-id">${escapeHtml(customerId)}</td>
                        <td>${escapeHtml(firstname)}</td>
                        <td>${escapeHtml(lastname)}</td>
                        <td class="full-name"><span class="first">${escapeHtml(firstname)}</span> <span class="last">${escapeHtml(lastname)}</span></td>
                        <td>${escapeHtml(age)}</td>
                        <td>
                            <span class="status-badge">
                                <span class="dot ${dotClass}"></span>
                                <span>${statusText}</span>
                            </span>
                        </td>
                        <td>
                            <button class="toggle-btn" data-id="${id}" data-status="${status}">
                                <i class="fas ${toggleIcon}"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
            updateStats(total, active, inactive);

            // ===== أزرار التبديل =====
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const recordId = this.dataset.id;
                    const currentStatus = parseInt(this.dataset.status, 10);
                    const newStatus = currentStatus === 1 ? 0 : 1;
                    handleToggle(recordId, newStatus, this);
                });
            });
        }

        // ===== جلب البيانات =====
        function fetchRecords() {
            retryBtn.style.display = 'none';

            fetch(API.fetchAll)
                .then(res => {
                    if (!res.ok) throw new Error('Network error');
                    return res.json();
                })
                .then(data => {
                    if (data.status === 'success') {
                        renderRecords(data.data);
                    } else {
                        tbody.innerHTML = `<tr><td colspan="8" class="empty-msg">⚠️ لا يمكن تحميل البيانات.</td></tr>`;
                    }
                })
                .catch(err => {
                    console.error('Fetch failed:', err);
                    tbody.innerHTML = `<tr><td colspan="8" class="empty-msg">⚠️ خطأ في الشبكة. اضغط "إعادة المحاولة"</td></tr>`;
                    retryBtn.style.display = 'flex';
                });
        }

        // ===== إعادة المحاولة =====
        function retryConnection() {
            retryBtn.style.display = 'none';
            tbody.innerHTML = `<tr><td colspan="8" class="empty-msg">🔄 جاري إعادة المحاولة...</td></tr>`;
            fetchRecords();
        }

        // ===== تبديل الحالة =====
        function handleToggle(recordId, newStatus, btnElement) {
            const row = btnElement.closest('tr');
            const statusCell = row.querySelector('.status-badge');
            const dot = statusCell.querySelector('.dot');
            const statusText = statusCell.querySelector('span:last-child');
            const icon = btnElement.querySelector('i');

            // تحديث الواجهة فوراً
            if (newStatus === 1) {
                dot.className = 'dot active';
                statusText.textContent = 'نشط';
                icon.className = 'fas fa-toggle-on';
                btnElement.dataset.status = '1';
            } else {
                dot.className = 'dot inactive';
                statusText.textContent = 'غير نشط';
                icon.className = 'fas fa-toggle-off';
                btnElement.dataset.status = '0';
            }

            // إرسال الطلب
            fetch(API.toggle, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `customer_id=${encodeURIComponent(recordId)}&status=${encodeURIComponent(newStatus)}`
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status !== 'success') {
                        console.warn('Toggle error, reverting');
                        fetchRecords();
                    } else {
                        fetchRecords();
                    }
                })
                .catch(err => {
                    console.error('Toggle error:', err);
                    fetchRecords();
                });
        }

        // ===== تحميل أولي =====
        fetchRecords();

        // ===== تحديث تلقائي كل 30 ثانية =====
        setInterval(fetchRecords, 30000);
    </script>
</body>
</html>
